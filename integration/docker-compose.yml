# Local, throwaway stack for smoke-testing the secrets adapters end-to-end.
#
#   cd integration
#   cp .env.example .env
#   docker compose up -d
#   ./bootstrap/bootstrap.sh      # seeds both systems, writes .env.generated
#   ./run-smoke.sh                # runs the SmokeTests console app
#
# Everything here is disposable: the credentials below are hard-coded on purpose
# because the stack only ever listens on localhost and holds nothing real.
# `docker compose down -v` removes all state.

name: adapters-secrets-smoke

services:
  # ---- VaultWarden (Bitwarden-compatible server) ----------------------------
  vaultwarden:
    image: vaultwarden/server:latest
    restart: unless-stopped
    environment:
      DOMAIN: "http://localhost:${VAULTWARDEN_PORT:-8080}"
      # Allow the bootstrap to register an account over HTTP with no SMTP.
      SIGNUPS_ALLOWED: "true"
      SIGNUPS_VERIFY: "false"
      # Admin panel is unused by the tests but handy for eyeballing state.
      ADMIN_TOKEN: "8i48lFlpMSg+NtkOb5fJKoLeZsN/UAYFUUZY0b5nf/3JqhxoR9GCKldCGe6d05ku"
      ROCKET_PORT: "80"
    ports:
      - "${VAULTWARDEN_PORT:-8080}:80"
    volumes:
      - vaultwarden-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/alive"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- Infisical + its Postgres and Redis -----------------------------------
  infisical-db:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: infisical
      POSTGRES_DB: infisical
    volumes:
      - infisical-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 5s
      timeout: 5s
      retries: 20

  infisical-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - infisical-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  infisical:
    # Pinned to a current release for reproducibility. NOTE: do NOT use the
    # `latest-postgres` tag -- it is a frozen legacy tag (~Aug 2025, from when
    # Infisical shipped separate Mongo/Postgres variants) and serves an old API.
    # The plain tags are current; bump this pin from Docker Hub as needed.
    # Migrations run automatically on startup.
    image: infisical/infisical:v0.162.7
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    environment:
      ENCRYPTION_KEY: "e0aa7ebcb4f5005fca2cca31093afc03"
      AUTH_SECRET: "gTvuwomFZqq6FJDypvn8HkI2MZEPFRsOFdGjfiCyqG4="
      DB_CONNECTION_URI: "postgres://infisical:infisical@infisical-db:5432/infisical"
      REDIS_URL: "redis://infisical-redis:6379"
      SITE_URL: "http://localhost:${INFISICAL_PORT:-8082}"
      TELEMETRY_ENABLED: "false"
    ports:
      - "${INFISICAL_PORT:-8082}:8080"

  # ---- HashiCorp Vault (dev mode: in-memory, auto-unsealed, KV v2 at secret/) -
  vault:
    image: hashicorp/vault:1.21
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-smoke-root-token}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: server -dev
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- One-shot seed helper (Node crypto + curl) ----------------------------
  # Not started by `up`; invoke explicitly once the stack is healthy:
  #   docker compose run --rm bootstrap
  bootstrap:
    profiles: ["bootstrap"]
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
    env_file:
      - .env
    depends_on:
      vaultwarden:
        condition: service_healthy
    volumes:
      - ./bootstrap:/bootstrap:ro
      # entrypoint writes .env.generated back to the integration/ directory
      - ./:/out

volumes:
  vaultwarden-data:
  infisical-db:
  infisical-redis:
